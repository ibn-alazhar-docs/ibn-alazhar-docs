name: ibn-al-azhar-docs

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ibn_docs
      POSTGRES_USER: ibn_docs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ibn_docs_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibn_docs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    command: ["sh", "-c", "npx prisma migrate deploy && npx tsx prisma/seed.ts"]
    environment:
      DATABASE_URL: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ibnalazhar.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ibn-al-azhar-docs
      S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3000
      APP_NAME: Ibn Al-Azhar Docs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ibn-al-azhar-docs
      S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OCR_PROVIDER: tesseract
      OCR_PROVIDERS: tesseract
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  export-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["npx", "tsx", "workers/export-worker/src/index.ts"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:${POSTGRES_PASSWORD:-ibn_docs_password}@postgres:5432/ibn_docs?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ibn-al-azhar-docs
      S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
