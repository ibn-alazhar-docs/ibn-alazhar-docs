name: ibn-al-azhar-docs-staging

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-readonly: &readonly-service
  read_only: true
  tmpfs:
    - /tmp
    - /app/apps/web/.next/cache

x-common-env: &common-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://ibn_staging:${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}@postgres:5432/ibn_staging?schema=public&connection_limit=15
  DATABASE_URL_DIRECT: postgresql://ibn_staging:${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}@postgres:5432/ibn_staging?schema=public
  REDIS_URL: redis://:${STAGING_REDIS_PASSWORD:?STAGING_REDIS_PASSWORD must be set}@redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: ibn-al-azhar-docs-staging
  S3_ACCESS_KEY_ID: ${STAGING_MINIO_ACCESS_KEY:?STAGING_MINIO_ACCESS_KEY must be set}
  S3_SECRET_ACCESS_KEY: ${STAGING_MINIO_SECRET_KEY:?STAGING_MINIO_SECRET_KEY must be set}

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${STAGING_HTTP_PORT:-8080}:80"
      - "${STAGING_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infrastructure/caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - staging-caddydata:/data
      - staging-caddyconfig:/config
    networks:
      - frontend
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${STAGING_PG_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ibn_staging
      POSTGRES_USER: ibn_staging
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}
    volumes:
      - staging-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibn_staging"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  pgbouncer:
    image: pgbouncer/pgbouncer:1.23.0
    ports:
      - "127.0.0.1:${STAGING_PGBOUNCER_PORT:-6433}:6432"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_DBNAME: ibn_staging
      DATABASES_USER: ibn_staging
      DATABASES_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: "15"
      PGBOUNCER_MAX_CLIENT_CONN: "100"
      PGBOUNCER_MIN_POOL_SIZE: "3"
      PGBOUNCER_LISTEN_ADDR: "0.0.0.0"
      PGBOUNCER_LISTEN_PORT: "6432"
      PGBOUNCER_LOG_CONNECTIONS: "0"
      PGBOUNCER_LOG_DISCONNECTIONS: "0"
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: "extra_float_digits,search_path"
      PGBOUNCER_LOGFILE: /tmp/pgbouncer.log
      QUIET: "yes"
    extra_hosts:
      - "postgres:172.20.0.2"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/opt/pgbouncer/pgbouncer", "--version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${STAGING_REDIS_PORT:-6380}:6379"
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${STAGING_REDIS_PASSWORD}
    volumes:
      - ./docker/redis/redis-staging.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${STAGING_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "127.0.0.1:${STAGING_MINIO_PORT:-9002}:9000"
      - "127.0.0.1:${STAGING_MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: ${STAGING_MINIO_ACCESS_KEY:?STAGING_MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${STAGING_MINIO_SECRET_KEY:?STAGING_MINIO_SECRET_KEY must be set}
    command: server /data --console-address ":9001"
    volumes:
      - staging-miniodata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && (test -f prisma/seed.ts && npx prisma db seed || true)",
      ]
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${STAGING_ADMIN_EMAIL:-admin-staging@ibnalazhar.app}
      ADMIN_PASSWORD: ${STAGING_ADMIN_PASSWORD:?STAGING_ADMIN_PASSWORD must be set}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    <<: *default-security

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${STAGING_WEB_PORT:-3001}:3000"
    environment:
      <<: *common-env
      AUTH_SECRET: ${STAGING_AUTH_SECRET:?STAGING_AUTH_SECRET must be set}
      AUTH_TRUST_HOST: "true"
      APP_URL: ${STAGING_APP_URL:-http://staging.ibnalazhar.app}
      APP_NAME: "Ibn Al-Azhar Docs (Staging)"
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    <<: [*default-security, *readonly-service]
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: ocr-runner
    environment:
      <<: *common-env
      OCR_PROVIDER: tesseract
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  export-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: export-runner
    environment:
      <<: *common-env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    <<: *default-security
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  staging-pgdata:
  staging-miniodata:
  staging-caddydata:
  staging-caddyconfig:

networks:
  backend:
    internal: true
  frontend:
