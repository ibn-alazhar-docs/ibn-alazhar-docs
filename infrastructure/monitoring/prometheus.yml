global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "web"
    # مصدّر Prometheus الفعلي (مُصادَق بـ Bearer token) — /api/metrics هو نقطة JSON خلف صلاحيات admin
    metrics_path: /api/metrics/prometheus
    scheme: "http"
    authorization:
      type: Bearer
      # يجب أن يطابق PROMETHEUS_BEARER_TOKEN المعيَّن لخدمة web (انظر .env.production.example)
      # ملاحظة: Prometheus لا يوسّع متغيّرات البيئة داخل ملف الإعداد — استبدل بالقيمة الفعلية
      credentials: "REPLACE_WITH_PROMETHEUS_BEARER_TOKEN"
    static_configs:
      - targets: ["web:3000"]
