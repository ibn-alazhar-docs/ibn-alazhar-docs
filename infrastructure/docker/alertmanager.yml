global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Configure your notification channels here:
    # email_configs:
    #   - to: "admin@ibnalazhar.app"
    #     from: "alerts@ibnalazhar.app"
    #     smarthost: "smtp.gmail.com:587"
    #     auth_username: "alerts@ibnalazhar.app"
    #     auth_password: "your-app-password"
    webhook_configs:
      - url: "http://localhost:3000/api/webhooks/alerts"
        send_resolved: true

  - name: "critical"
    # Same as above but for critical alerts
    webhook_configs:
      - url: "http://localhost:3000/api/webhooks/alerts"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
