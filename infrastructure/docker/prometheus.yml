global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "ibn-al-azhar-docs"
    metrics_path: "/api/metrics/prometheus"
    static_configs:
      - targets: ["web:3000"]
        labels:
          service: "ibn-al-azhar-docs"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
