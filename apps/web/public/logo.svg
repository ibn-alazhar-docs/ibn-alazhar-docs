<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#086941;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ca8a04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e601e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#primaryGrad)" />

  <!-- Islamic geometric pattern (8-pointed star) -->
  <g transform="translate(100, 55)" fill="url(#goldGrad)" opacity="0.9">
    <polygon points="0,-30 7.5,-7.5 30,0 7.5,7.5 0,30 -7.5,7.5 -30,0 -7.5,-7.5" />
    <circle cx="0" cy="0" r="12" fill="#ffffff" opacity="0.95" />
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="url(#primaryGrad)">أ</text>
  </g>

  <!-- Arabic text: ابن العزيز -->
  <text x="100" y="115" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="1">ابن العزيز</text>

  <!-- English text: Docs -->
  <text x="100" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="url(#goldGrad)" letter-spacing="2">DOCS</text>

  <!-- Decorative line -->
  <line x1="40" y1="150" x2="160" y2="150" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7" />

  <!-- Small decorative dots -->
  <circle cx="35" cy="150" r="2" fill="url(#goldGrad)" />
  <circle cx="165" cy="150" r="2" fill="url(#goldGrad)" />
</svg>
