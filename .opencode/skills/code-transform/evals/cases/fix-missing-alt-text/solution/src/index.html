<!DOCTYPE html>
<html lang="en">
<head>
  <title>Acme Corp — Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="logo.png" alt="Acme Corp logo">
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <img src="hero.jpg" alt="Team collaborating in modern office">
      <h1>Welcome to Acme Corp</h1>
      <p>We build amazing things.</p>
      <button>Get Started</button>
    </section>

    <section class="team">
      <h2>Our Team</h2>
      <div class="team-grid">
        <div class="team-member">
          <img src="avatar.png" alt="Portrait of Jane Doe, CEO">
          <h3>Jane Doe</h3>
          <p>CEO</p>
        </div>
        <div class="team-member">
          <img src="avatar.png" alt="Portrait of John Smith, CTO">
          <h3>John Smith</h3>
          <p>CTO</p>
        </div>
        <div class="team-member">
          <img src="avatar.png" alt="Portrait of Alice Lee, Designer">
          <h3>Alice Lee</h3>
          <p>Designer</p>
        </div>
      </div>
    </section>

    <section class="products">
      <h2>Our Products</h2>
      <div class="product-card">
        <img src="product1.jpg" alt="Widget Pro — premium widget with aluminum casing">
        <h3>Widget Pro</h3>
        <p>$49.99</p>
      </div>
      <div class="product-card">
        <img src="product2.jpg" alt="Widget Lite — compact widget for everyday use">
        <h3>Widget Lite</h3>
        <p>$29.99</p>
      </div>
    </section>
  </main>

  <footer>
    <img src="footer-logo.png" alt="Acme Corp footer logo" role="presentation">
    <p>&copy; 2026 Acme Corp</p>
  </footer>
</body>
</html>
