name: Nightly Regression

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: nightly-regression
  cancel-in-progress: false

env:
  DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
  REDIS_URL: redis://localhost:6379
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium

      - name: Lint & TypeCheck
        run: |
          pnpm format:check
          pnpm lint
          pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: API Tests
        run: pnpm test:api

      - name: Frontend Tests
        run: pnpm test:frontend

      - name: Integration Tests
        run: pnpm test:integration

      - name: Edge Cases
        run: pnpm test:edge

      - name: Fuzz Tests
        run: pnpm test:fuzz

      - name: Security Tests
        run: pnpm test:security

      - name: Pentest Tests
        run: pnpm test:pentest

      - name: Recovery Tests
        run: npx vitest run --config vitest.recovery.config.ts

      - name: Backup Tests
        run: npx vitest run --config vitest.backup.config.ts

      - name: Load Tests
        run: npx vitest run --config vitest.load.config.ts
        continue-on-error: true

      - name: Regression Suite
        run: npx vitest run tests/regression/regression-suite.test.ts
        continue-on-error: true

      - name: E2E Tests
        run: npx playwright test
        continue-on-error: true
        timeout-minutes: 30

      - name: Coverage
        run: pnpm coverage

      - name: Generate Summary
        run: node scripts/ci-summary.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-test-results
          path: |
            test-results/
            coverage/
            playwright-report/
          retention-days: 14

      - uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Nightly regression failed",
              body: [
                "Full test suite failed on `${{ github.ref_name }}`.",
                "",
                "**Workflow:** [Run #${{ github.run_id }}](" + runUrl + ")",
                "**Branch:** ${{ github.ref_name }}",
                "**Commit:** ${{ github.sha }}",
                "",
                "Check the run logs for details on which tests failed.",
                "This issue is auto-generated — investigate and fix before next deploy.",
              ].join("\n"),
              labels: ["regression", "automated"],
            });
