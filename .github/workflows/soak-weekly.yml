name: Weekly Soak Tests

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

concurrency:
  group: weekly-soak
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
  REDIS_URL: redis://localhost:6379

jobs:
  soak-tests:
    name: Soak Tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium

      - name: Load tests (vitest)
        run: npx vitest run --config vitest.load.config.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Recovery tests (long duration)
        run: npx vitest run --config vitest.recovery.config.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Backup validation
        run: npx vitest run --config vitest.backup.config.ts
        timeout-minutes: 10
        continue-on-error: true

      - name: Full E2E suite
        run: npx playwright test --reporter=html
        timeout-minutes: 45
        continue-on-error: true

      - name: Generate soak report
        run: node scripts/ci-summary.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⏱️ Weekly soak tests detected issues",
              body: [
                "Soak test run flagged failures.",
                "",
                "**Workflow:** [Run #${{ github.run_id }}](" + runUrl + ")",
                "**Date:** ${{ github.event.schedule || 'manual trigger' }}",
                "",
                "Review the soak report and address failures.",
              ].join("\n"),
              labels: ["soak-test", "automated"],
            });
