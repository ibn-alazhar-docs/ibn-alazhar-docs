name: CI

on:
  push:
    branches: [main, "feat/*", "fix/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prettier --check .
        name: Format check

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        name: ESLint check

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
        name: Prisma generate
      - run: pnpm typecheck
        name: TypeScript type check

  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
        name: Prisma generate
      - run: npx prisma migrate deploy
        name: Prisma migrate
      - run: pnpm test
        name: Run unit tests
      - run: pnpm test:security
        name: Run security tests

  integration:
    runs-on: ubuntu-24.04
    needs: [format, lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
        name: Prisma generate
      - run: npx prisma migrate deploy
        name: Prisma migrate
      - run: pnpm test:integration
        name: Run integration tests

  build:
    runs-on: ubuntu-24.04
    needs: [format, lint, typecheck, test, integration]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
        name: Prisma generate
      - run: npx next build
        working-directory: apps/web
        name: Next.js build
      - name: Check bundle size
        working-directory: apps/web
        run: |
          echo "=== Bundle Size Report ==="
          du -sh .next/ 2>/dev/null || true
          du -sh .next/static/ 2>/dev/null || true
          echo "--- Page bundles ---"
          find .next/static/chunks -name "*.js" -exec du -h {} + 2>/dev/null | sort -rh | head -20 || true
          TOTAL_KB=$(du -sk .next/ 2>/dev/null | cut -f1)
          echo "Total .next size: ${TOTAL_KB}KB"
          MAX_KB=51200
          if [ "$TOTAL_KB" -gt "$MAX_KB" ]; then
            echo "::error::Bundle size ${TOTAL_KB}KB exceeds ${MAX_KB}KB limit"
            exit 1
          fi
          echo "Bundle size OK: ${TOTAL_KB}KB <= ${MAX_KB}KB"
      - name: Build Docker images
        run: |
          docker build -t ibn-web -f Dockerfile .
          docker build -t ibn-ocr-worker -f Dockerfile.worker --target ocr-runner .
          docker build -t ibn-export-worker -f Dockerfile.worker --target export-runner .

  security:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Build Docker image for scanning
        run: docker build -t ibn-web-scan -f Dockerfile .

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "ibn-web-scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "MEDIUM,HIGH,CRITICAL"
