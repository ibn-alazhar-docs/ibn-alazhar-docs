name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    needs: [] # runs after CI passes (separate workflow)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OCR worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          target: ocr-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-worker:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push export worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          target: export-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/export-worker:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/export-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-24.04
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/setup-ssh-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          config: |
            Host deploy
              HostName ${{ secrets.DEPLOY_HOST }}
              User ${{ secrets.DEPLOY_USER }}
              Port ${{ secrets.DEPLOY_PORT || '22' }}
              IdentityFile ~/.ssh/id_rsa

      - name: Deploy to production over SSH
        run: |
          set -euo pipefail

          APP_DIR="${{ secrets.DEPLOY_APP_DIR || '/app' }}"
          SERVICE="${{ secrets.DEPLOY_COMPOSE_SERVICE || 'web' }}"
          HEALTH_URL="${{ secrets.DEPLOY_HEALTH_URL }}"
          REGISTRY_TOKEN="${{ secrets.DEPLOY_REGISTRY_TOKEN }}"

          ssh deploy bash -s <<EOF
            set -euo pipefail

            cd "\${APP_DIR}"

            # Authenticate to the container registry so we can pull the new images.
            if [ -n "\${REGISTRY_TOKEN}" ]; then
              echo "\${REGISTRY_TOKEN}" | docker login ghcr.io -u "${{ secrets.DEPLOY_USER }}" --password-stdin
            fi

            # Pull the freshly built images.
            docker compose pull

            # Apply database migrations against the already-pulled image.
            docker compose run --rm "\${SERVICE}" npx prisma migrate deploy

            # Restart the stack with the new images.
            docker compose up -d

            # Wait for the health endpoint to report healthy.
            if [ -n "\${HEALTH_URL}" ]; then
              for i in \$(seq 1 30); do
                if curl -fsS "\${HEALTH_URL}" > /dev/null 2>&1; then
                  echo "Health check passed"
                  exit 0
                fi
                sleep 3
              done
              echo "::error::Health check failed after deployment"
              docker compose ps
              exit 1
            else
              echo "DEPLOY_HEALTH_URL not set; skipping healthcheck"
            fi
          EOF
