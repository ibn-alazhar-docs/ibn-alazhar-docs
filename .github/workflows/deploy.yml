name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    needs: [] # runs after CI passes (separate workflow)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OCR worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          target: ocr-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-worker:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ocr-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push export worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          target: export-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/export-worker:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/export-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-24.04
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploy ${{ github.sha }} to production"
          # Add your deploy command here:
          # ssh $PROD_HOST "cd /app && docker compose pull && docker compose up -d"
