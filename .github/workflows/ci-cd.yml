name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to staging after successful build"
        required: false
        default: "false"
        type: boolean

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.4"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------
  # Quality Gates (must pass before anything else)
  # ------------------------------------------------------------
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Format check
        run: pnpm format:check

      - name: Lint (apps + packages + workers)
        run: pnpm lint

      - name: Typecheck (all workspaces)
        run: pnpm typecheck

      - name: Secrets scan
        run: pnpm secrets:scan

  # ------------------------------------------------------------
  # Unit Tests
  # ------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run unit tests
        run: pnpm vitest run --project=unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ------------------------------------------------------------
  # Integration Tests (with postgres/redis)
  # ------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-gates
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ibn_docs
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U ibn_docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-do-not-use-in-prod
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Seed database
        run: pnpm db:seed

      - name: Run integration tests
        run: pnpm vitest run --project=integration

  # ------------------------------------------------------------
  # API Tests
  # ------------------------------------------------------------
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ibn_docs
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U ibn_docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-do-not-use-in-prod
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Run API tests
        run: pnpm vitest run --project=api

  # ------------------------------------------------------------
  # Security Tests (with postgres/redis)
  # ------------------------------------------------------------
  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gates
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ibn_docs
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U ibn_docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-do-not-use-in-prod
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Run security tests
        run: pnpm vitest run --project=security

  # ------------------------------------------------------------
  # Frontend Tests (jsdom)
  # ------------------------------------------------------------
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm vitest run --project=frontend

  # ------------------------------------------------------------
  # E2E Tests (Playwright)
  # ------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-gates
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ibn_docs
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U ibn_docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:postgres@localhost:5432/ibn_docs?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-do-not-use-in-prod
      NODE_ENV: test
      S3_ACCESS_KEY_ID: dummy
      S3_SECRET_ACCESS_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Seed database
        run: pnpm db:seed

      - name: Build web app
        run: pnpm --filter @ibn-al-azhar-docs/web build

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  # ------------------------------------------------------------
  # Security Scanning
  # ------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gates
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: typescript, javascript
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ------------------------------------------------------------
  # Build Docker Images
  # ------------------------------------------------------------
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality-gates, test-unit, test-integration, test-api, test-security, test-frontend, test-e2e, security]
    if: github.event_name == 'push' || github.event.workflow_dispatch.inputs.deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            S3_ACCESS_KEY_ID=dummy
            S3_SECRET_ACCESS_KEY=dummy

      - name: Build and push OCR worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ocr-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ocr-worker:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push export worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: export-runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/export-worker:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------
  # Deploy to Staging
  # ------------------------------------------------------------
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.event_name == 'push' || github.event.workflow_dispatch.inputs.deploy == 'true'
    environment: staging
    steps:
      - name: Deploy to Northflank (free tier)
        if: env.NORTHFLANK_API_TOKEN != ''
        uses: northflank/github-action@v1
        with:
          api-token: ${{ secrets.NORTHFLANK_API_TOKEN }}
          project: ibn-al-azhar-docs
          service: web
          docker-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_REGION=${{ secrets.S3_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            APP_URL=${{ secrets.APP_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy to Railway (fallback)
        if: env.RAILWAY_TOKEN != '' && env.NORTHFLANK_API_TOKEN == ''
        uses: railway/cli@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          command: up --service web --detach

      - name: Verify deployment health
        run: |
          echo "Waiting for deployment to be ready..."
          for i in {1..30}; do
            if curl -fsS "${{ secrets.APP_URL }}/api/health" | grep -q '"status":"healthy"'; then
              echo "✅ Deployment healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1

  # ------------------------------------------------------------
  # Notify
  # ------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [quality-gates, test-unit, test-integration, test-api, test-security, test-frontend, test-e2e, security, build, deploy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gates | ${{ needs.quality-gates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.test-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.test-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
