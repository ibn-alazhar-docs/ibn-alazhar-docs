name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}-${{ github.job }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
  AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
  REDIS_URL: redis://localhost:6379
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck

  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-24.04
    needs: [lint-typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      DATABASE_URL_DIRECT: postgresql://ibn_docs:ibn_docs_password@localhost:5432/ibn_docs?schema=public
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-minimum-32-chars
      REDIS_URL: redis://localhost:6379
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ibn_docs; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
      - run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
      - run: pnpm test
      - run: pnpm test:api
      - run: pnpm test:frontend
      - name: Run regression suite
        run: npx vitest run tests/regression/regression-suite.test.ts
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit
          path: test-results/
          retention-days: 7

  security-tests:
    name: Security Tests
    runs-on: ubuntu-24.04
    needs: [lint-typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ibn_docs; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
      - run: pnpm test:security
      - run: pnpm test:pentest

  integration-edge-fuzz:
    name: Integration, Edge & Fuzz
    runs-on: ubuntu-24.04
    needs: [lint-typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ibn_docs
          POSTGRES_PASSWORD: ibn_docs_password
          POSTGRES_DB: ibn_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ibn_docs; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
      - run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
      - run: pnpm test:integration
      - run: pnpm test:edge
      - run: pnpm test:fuzz

  e2e-tests:
    name: E2E Tests (Critical)
    runs-on: ubuntu-24.04
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: npx playwright install --with-deps chromium
      - run: pnpm build
      - name: Run critical E2E flows
        run: npx playwright test tests/e2e/auth-flows.spec.ts tests/e2e/document-crud.spec.ts
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage:
    name: Coverage Report
    runs-on: ubuntu-24.04
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: pnpm coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  ci-summary:
    name: Generate CI Summary
    runs-on: ubuntu-24.04
    needs: [unit-tests, security-tests, integration-edge-fuzz, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate summary
        run: node scripts/ci-summary.mjs >> $GITHUB_STEP_SUMMARY
