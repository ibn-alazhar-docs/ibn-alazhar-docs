version: "3.8"

services:
  autonoma:
    image: autonoma/autonoma:latest
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      AUTONOMA_BASE_URL: http://host.docker.internal:3000
      AUTONOMA_HEADLESS: "true"
    volumes:
      - ./autonoma.config.json:/app/autonoma.config.json:ro
      - autonoma-results:/app/results
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    working_dir: /app
    volumes:
      - ./:/app:ro
      - playwright-results:/app/test-results
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    entrypoint: ["npx", "playwright", "test"]
    profiles:
      - testing

volumes:
  autonoma-results:
  playwright-results:
